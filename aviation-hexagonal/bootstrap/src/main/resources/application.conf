postgres {
  url      = "jdbc:postgresql://localhost:5432/aviation"
  url      = ${?POSTGRES_URL}
  user     = "aviation"
  user     = ${?POSTGRES_USER}
  password = "aviation"
  password = ${?POSTGRES_PASSWORD}
  max-pool-size = 10
}

kafka {
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}
  group-id = "aviation-consumer-group"
}

http {
  port = 8080
  port = ${?HTTP_PORT}
}
